services:
  backend:
    build: ./backend
    restart: always
    environment:
      - DB_PATH=/app/data/syllabus_helper.db
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-use-a-random-string}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - CORS_ORIGINS=https://syllabushelper.net,http://syllabushelper.net,http://localhost:3000
    volumes:
      - db_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
